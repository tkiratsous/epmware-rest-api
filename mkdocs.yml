# mkdocs.yml - REST API Guide
site_name: EPMware REST API Guide
site_description: Complete reference guide for EPMware REST API integration and automation
site_author: EPMware, Inc.
site_url: https://rest-api-guide.epmware.com

validation:
  nav:
    omitted_files: info
    not_found: warn
    absolute_links: info

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  
  features:
  - navigation.top
  - navigation.indexes
  - search.highlight
  - search.share
  - search.suggest
  - content.code.copy
  - content.tooltips
  - navigation.footer
  - toc.follow
  - toc.integrate
  
  logo: assets/images/epmware-logo.png
  favicon: assets/images/favicon.ico

extra_css:
  - assets/css/custom.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search:
      lang: en
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom

# Navigation structure
nav:
  - Documentation Center: https://docs.epmware.com
  
  - REST API Home:
    - index.md
  
  - Getting Started:
    - getting-started/index.md
    - Authentication: getting-started/authentication.md
    - URL Structure: getting-started/url-structure.md
    - Response Formats: getting-started/response-formats.md
  
  - API Modules:
    - modules/index.md
    - Task Module:
      - modules/task/index.md
      - Get Task Status: modules/task/get-status.md
      - Get Log File: modules/task/get-log-file.md
    - ERP Module:
      - modules/erp/index.md
      - Upload File: modules/erp/upload-file.md
      - Run Import: modules/erp/run-import.md
    - Deployment Module:
      - modules/deployment/index.md
      - Run Deployment: modules/deployment/run-deployment.md      
    - Export Module:
      - modules/export/index.md
      - Run Export: modules/export/run-export.md
      - Download File: modules/export/download-file.md
      - Get Execution Details: modules/export/get-execution-details.md
    - Security Module:
      - modules/security/index.md
      - SSO User Management:
        - modules/security/sso_apis/create.md
        - modules/security/sso_apis/update.md
        - modules/security/sso_apis/disable.md
        - modules/security/sso_apis/enable.md
        - modules/security/sso_apis/assign-groups.md
        - modules/security/sso_apis/unassign-groups.md
      - User and Groups Management:
        - modules/security/user_groups/get-users.md
        - modules/security/user_groups/get-groups.md
        - modules/security/user_groups/get-group-users.md
 


